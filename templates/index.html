<!DOCTYPE html>
<html>
<head>
<title>シフト生成</title>
<style>

        body {

            font-family: sans-serif;

            text-align: center;

            padding: 20px;

        }

        input, textarea {

            width: 90%;

            margin: 5px;

            padding: 10px;

        }

        button {

            padding: 10px 20px;

            font-size: 16px;

            margin: 10px;

        }

        table {

            border-collapse: collapse;

            margin: auto;

            margin-top: 20px;

        }

        th, td {

            border: 1px solid black;

            padding: 10px;

        }
</style>
</head>
<body>
<h1>シフト生成アプリ</h1>
<form method="POST">
<h3>メンバー（カンマ区切り）</h3>
<textarea name="members">あびす,たいき,ゆうき,あずこう,たくみ,りくと</textarea>
<h3>バンド（カンマ区切り）</h3>
<textarea name="bands">ぼくら,ドロス,ラッド,ふじい,ミセス,コトリ</textarea>
<br>
<button type="submit">シフト生成</button>
</form>

{% if schedule %}
<table>
<tr>
<th>バンド</th>
<th>担当1</th>
<th>担当2</th>
</tr>

    {% for band, members in schedule.items() %}
<tr>
<td>{{ band }}</td>
<td>{{ members[0] }}</td>
<td>{{ members[1] }}</td>
</tr>

    {% endfor %}
</table>

{% endif %}
</body>
</html>
